<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:wght@400;500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="grime-theme">
    <div id="app">
        <!-- React will mount here, but for now we'll start with the base UI -->

            <h1 onclick="location.hash='#home'">ALEXANDRIA</h1>
            <nav class="main-nav">
                <a href="#home" class="nav-link">Home</a>
                <a href="#movies" class="nav-link">Movies</a>

            </nav>
            <div class="header-actions">
                <button id="search-trigger" class="icon-btn">🔍</button>
            </div>
        </header>

        <main id="content">
            <div class="placeholder-msg">INITIALIZING ARCHIVE ACCESS...</div>
        </main>

        <footer class="survivor-log">
            <p>&copy; Survival Year 2 | Alexandria Archive</p>
        </footer>
