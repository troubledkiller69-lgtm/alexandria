<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria | Survival Streaming</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="grime-theme">
    <div id="app">
        <!-- React will mount here, but for now we'll start with the base UI -->
        <header class="watchtower">
            <h1>ALEXANDRIA</h1>
            <nav>
                <button id="gate-control">THE GATE</button>
            </nav>
        </header>

        <main id="content">
            <section class="hero">
                <div class="hero-content">
                    <h2>Everything you love. All in one place.</h2>
                    <p>Access the exclusive Alexandria archive. High-quality streaming for the community.</p>
                    <div class="auth-buttons">
                        <button class="btn-primary">GET STARTED</button>
                        <button class="btn-secondary">LEARN MORE</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="survivor-log">
            <p>&copy; Survival Year 2 | Alexandria Archive</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
