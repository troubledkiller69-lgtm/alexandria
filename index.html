<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria | Archive</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="sleek-premium-theme">
    <div id="loading-screen">
        <div class="loader-content">
            <div class="elegant-spinner"></div>
            <img src="logo.png" class="brand-logo loader-logo" alt="Alexandria">
            <p class="loader-status">We are the ones who live.</p>
        </div>
    </div>

    <div id="app" class="hidden layout-wrapper">
        <header class="top-nav">
            <button id="sidebar-toggle" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="header-brand" onclick="location.hash='#home'">
                <img src="logo.png" class="brand-logo" alt="Alexandria">
            </div>
            <div class="top-nav-actions">
                <button id="search-trigger" class="icon-btn" title="Search">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </header>

        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <aside class="cyber-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand" onclick="location.hash='#home'">
                    <img src="logo.png" class="brand-logo" alt="Alexandria">
                </div>
                <button id="sidebar-close" class="icon-btn close-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <nav class="main-nav">
                <a href="#home" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Home</a>
                <a href="#movies" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg> Movies</a>
                <a href="#tv" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg> TV Shows</a>
                <a href="#anime" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg> Anime</a>

                <a href="#franchises" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg> Franchises</a>
                <a href="#420" class="nav-link nav-vip"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M12 22s-4-6-4-12a4 4 0 0 1 8 0c0 6-4 12-4 12z"></path><path d="M12 14s-6-4-6-8a6 6 0 0 1 12 0c0 4-6 8-6 8z"></path></svg> 420 Zone</a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-actions">
                    <button id="auth-trigger" class="icon-btn tooltip" data-tip="Identity Core">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </button>
                </div>
                <div class="system-status">
                    <div class="status-dot"></div>
                    <span class="status-text">OFFLINE</span>
                </div>
            </div>
        </aside>

        <main id="content" class="main-view">
            <div class="placeholder-msg">CONNECTING...</div>
        </main>
        
        <button id="back-to-top" title="Return to Top">↑</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
