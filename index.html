<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Stardos+Stencil:wght@400;700&family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="grime-theme">
    <div id="loading-screen">
        <div class="loader-content">
            <div class="safe-zone-stamp">A</div>
            <h1 class="archive-title">ALEXANDRIA</h1>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p class="loader-status">OPENING THE GATES...</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <!-- React will mount here, but for now we'll start with the base UI -->
        <header class="watchtower">
            <h1 onclick="location.hash='#home'">ALEXANDRIA</h1>
            <nav class="main-nav">
                <a href="#home" class="nav-link">Home</a>
                <a href="#movies" class="nav-link">Movies</a>
                <a href="#tv" class="nav-link">TV Shows</a>
                <a href="#anime" class="nav-link">Anime</a>
                <a href="#420" class="nav-link nav-420">420</a>
            </nav>
            <div class="header-actions">
                <button id="search-trigger" class="icon-btn" title="Search">🔍</button>
                <button id="auth-trigger" class="icon-btn" title="Identity Protocol">👤</button>
            </div>
        </header>

        <main id="content">
            <div class="placeholder-msg">INITIALIZING ARCHIVE ACCESS...</div>
        </main>

        <footer class="survivor-log">
            <div class="footer-content">
                <div class="system-status">
                    <div class="status-dot"></div>
                    <span class="status-text">ESTABLISHING CONNECTION...</span>
                </div>
                <p>Thoughtfully Crafted By Rxtribution & Yuntoez</p>
            </div>
        </footer>
        
        <button id="back-to-top" title="Back to Surface">↑</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
